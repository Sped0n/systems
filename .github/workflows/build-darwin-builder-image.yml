name: Build Darwin Builder Image

on:
  push:
    branches: [main]
    paths:
      - "modules/darwin/services/builder/image/**"
      - ".github/workflows/build-darwin-builder-image.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: darwin-builder

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read image metadata
        id: image
        run: |
          set -euo pipefail
          version="$(sed -nE 's/^FROM nixos\/nix:([0-9]+\.[0-9]+\.[0-9]+)$/\1/p' modules/darwin/services/builder/image/Dockerfile)"
          if [ -z "$version" ]; then
            echo "Dockerfile must use FROM nixos/nix:<x.xx.x>" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$version-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Read nixpkgs revision
        id: nixpkgs
        run: |
          set -euo pipefail
          revision="$(jq -er '.nodes.nixpkgs.locked.rev' flake.lock)"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: modules/darwin/services/builder/image
          build-args: |
            NIXPKGS_REV=${{ steps.nixpkgs.outputs.revision }}
          platforms: linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/sped0n/${{ env.IMAGE_NAME }}:latest
            ghcr.io/sped0n/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}
