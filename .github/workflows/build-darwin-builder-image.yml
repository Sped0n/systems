name: Build Darwin Builder Image

on:
  push:
    branches: [master]
    paths:
      - "modules/darwin/services/builder/image/**"
      - ".github/workflows/build-darwin-builder-image.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: darwin-builder

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read Nix version
        id: version
        run: |
          set -euo pipefail
          version="$(tr -d '\n' < modules/darwin/services/builder/image/IMAGE_VERSION)"
          dockerfile_version="$(sed -n 's/^FROM nixos\/nix:\(.*\)/\1/p' modules/darwin/services/builder/image/Dockerfile)"
          if [ "$version" != "$dockerfile_version" ]; then
            echo "builder image version ($version) does not match Dockerfile ($dockerfile_version)" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: modules/darwin/services/builder/image
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/sped0n/${{ env.IMAGE_NAME }}:latest
            ghcr.io/sped0n/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
